name: Daily LeetCode Contribution Sync

on:
  schedule:
    # Runs automatically every day at 12:00 UTC (17:30 IST)
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to push commits back to the repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure Git
        run: |
          git config --global user.name "thai-shriya"
          git config --global user.email "thaishriya@gmail.com"

      - name: Run Contribution Sync
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: python3 .github/scripts/sync_leetcode.py
